# =============================================
# CONFIGURAÇÃO H2 (banco em memória - padrão)
# =============================================
spring.datasource.url=jdbc:h2:mem:baozidb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Console H2 acessível em http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# =============================================
# CONFIGURAÇÃO MySQL (descomente para usar)
# =============================================
